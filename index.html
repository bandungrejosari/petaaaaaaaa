<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Peta UMKM</title>

    <link rel="stylesheet"
          href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
    <style>
        #map{
            height:600px;
            width:100%;
        }
        #hasilTerdekat { margin-top: 10px; max-height: 200px; overflow-y: auto; }
    </style>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<h2 class = "judul" >Peta Kuliner Bandungrejosari</h2>

<div id="map">
        <div class="map-toolbar">
        <div class="toolbar-scroll">
        <input
            type="text"
            id="searchBox"
            placeholder="🔍Mam apaaa nyak..."
            onclick="bukaSearch()">
        <button onclick="lokasiSaya()">📍 Lokasi Saya</button>
        <button onclick="cariTerdekat()">🍽️ Kuliner</button>
        <button onclick="cariMakananTerdekat()">🍜 Makanan</button>
        <button onclick="cariMinumanTerdekat()">🥤 Minuman</button>
        </div>
    </div>
     <div id="searchOverlay">
        <button class="close-btn" onclick="tutupSearch()">
            ← Kembali
        </button>

        <input
            type="text"
            id="searchInput"
            placeholder="Cari UMKM..."
            oninput="cariUMKM()"
            autofocus>

        <div id="hasilSearch"></div>

    </div>
</div>
    <div id="bottomSheet">

        <div class="sheet-handle"></div>

        <button class="close-sheet"
                onclick="tutupSheet()">
            ✕
        </button>

        <div id="sheetContent"></div>

    </div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

    <script src="script.js"></script>
    
    

</body>
</html>
